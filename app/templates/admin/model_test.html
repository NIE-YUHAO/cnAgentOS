{% extends "layout.html" %}

{% block title %}模型测试{% end %}

{% block page_title %}模型引擎 - 模型测试{% end %}

{% block content %}
<div class="test-container">
    <div class="test-header">
        <div class="header-left">
            <h2><i class="layui-icon layui-icon-message-circle" style="margin-right: 10px;"></i>模型对话测试</h2>
            <p class="subtitle">与AI模型进行实时对话测试</p>
        </div>
        <div class="header-right">
            <a href="/admin/model" class="layui-btn layui-btn-primary">
                <i class="layui-icon layui-icon-arrow-left"></i> 返回列表
            </a>
        </div>
    </div>

    <div class="test-content">
        <div class="model-selector">
            <label class="selector-label">选择模型</label>
            <select id="modelSelector" lay-verify="required">
                <option value="">请选择模型</option>
                {% for m in models %}
                <option value="{{ m['id'] }}" {% if model and model.id == m['id'] %}selected{% end %}>
                    {{ m.name }} {% if m.is_default == 1 %}(默认){% end %}
                </option>
                {% end %}
            </select>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message system">
                    <div class="message-content">
                        <i class="layui-icon layui-icon-robot" style="margin-right: 8px;"></i>
                        欢迎使用模型测试功能！请选择一个模型并开始对话。
                    </div>
                </div>
            </div>

            <div class="chat-input">
                <textarea id="messageInput" placeholder="输入您的问题..." rows="3"></textarea>
                <div class="input-actions">
                    <label class="checkbox-label">
                        <input type="checkbox" id="streamMode"> 流式响应(SSE)
                    </label>
                    <button class="layui-btn" id="sendBtn">
                        <i class="layui-icon layui-icon-send"></i> 发送
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.test-container {
    padding: 20px;
    height: calc(100vh - 160px);
    display: flex;
    flex-direction: column;
}

.test-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 20px;
    background: linear-gradient(135deg, #166534 0%, #15803d 100%);
    border-radius: 12px;
    color: #fff;
}

.header-left h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
}

.subtitle {
    margin: 5px 0 0 0;
    color: rgba(255, 255, 255, 0.8);
    font-size: 14px;
}

.test-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.model-selector {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px 20px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
}

.selector-label {
    font-weight: 500;
    color: #333;
}

#modelSelector {
    min-width: 300px;
    padding: 8px 12px;
    border: 1px solid #e6e6e6;
    border-radius: 6px;
}

.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    overflow: hidden;
}

.chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #fafafa;
}

.message {
    margin-bottom: 20px;
    display: flex;
    gap: 12px;
}

.message.user {
    justify-content: flex-end;
}

.message.system {
    justify-content: center;
}

.message.bot {
    justify-content: flex-start;
}

.message-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.message.user .message-avatar {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
}

.message.bot .message-avatar {
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: #fff;
}

.message-content {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14px;
}

.message.user .message-content {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border-radius: 16px 16px 4px 16px;
}

.message.bot .message-content {
    background: #fff;
    color: #333;
    border: 1px solid #e6e6e6;
    border-radius: 16px 16px 16px 4px;
}

.message.system .message-content {
    background: rgba(0, 0, 0, 0.05);
    color: #666;
    font-size: 13px;
    border-radius: 20px;
}

.chat-input {
    padding: 20px;
    border-top: 1px solid #e6e6e6;
    background: #fff;
}

#messageInput {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #e6e6e6;
    border-radius: 8px;
    resize: none;
    font-size: 14px;
    margin-bottom: 15px;
}

#messageInput:focus {
    outline: none;
    border-color: #667eea;
}

.input-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: #666;
    font-size: 14px;
}

#sendBtn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
}

#sendBtn:hover {
    opacity: 0.9;
}

.loading-dots {
    display: inline-flex;
    gap: 4px;
}

.loading-dots span {
    width: 6px;
    height: 6px;
    background: #667eea;
    border-radius: 50%;
    animation: loading 1.4s infinite ease-in-out both;
}

.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes loading {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}

@media (max-width: 768px) {
    .message-content {
        max-width: 85%;
    }
}
</style>
{% end %}

{% block script %}
<script>
layui.use(['layer'], function() {
    var layer = layui.layer;

    function addMessage(role, content) {
        var avatar = role === 'user' ? 'user' : 'bot';
        var html = `
            <div class="message ${avatar}">
                <div class="message-avatar">
                    <i class="layui-icon layui-icon-${role === 'user' ? 'user' : 'robot'}"></i>
                </div>
                <div class="message-content">${escapeHtml(content)}</div>
            </div>
        `;
        $('#chatMessages').append(html);
        scrollToBottom();
    }

    function addSystemMessage(content) {
        var html = `
            <div class="message system">
                <div class="message-content">${content}</div>
            </div>
        `;
        $('#chatMessages').append(html);
        scrollToBottom();
    }

    function addLoadingMessage() {
        var html = `
            <div class="message bot" id="loadingMessage">
                <div class="message-avatar">
                    <i class="layui-icon layui-icon-robot"></i>
                </div>
                <div class="message-content">
                    <div class="loading-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        `;
        $('#chatMessages').append(html);
        scrollToBottom();
    }

    function removeLoadingMessage() {
        $('#loadingMessage').remove();
    }

    function scrollToBottom() {
        var container = document.getElementById('chatMessages');
        container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    $('#sendBtn').on('click', function() {
        var modelId = $('#modelSelector').val();
        var message = $('#messageInput').val().trim();
        var streamMode = $('#streamMode').is(':checked');

        if (!modelId) {
            layer.msg('请选择模型', {icon: 2});
            return;
        }

        if (!message) {
            layer.msg('请输入消息', {icon: 2});
            return;
        }

        addMessage('user', message);
        $('#messageInput').val('');
        addLoadingMessage();

        if (streamMode) {
            sendStreamRequest(modelId, message);
        } else {
            sendRequest(modelId, message);
        }
    });

    function sendRequest(modelId, message) {
        fetch('/admin/model/test/api', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `model_id=${modelId}&message=${encodeURIComponent(message)}`
        })
        .then(response => response.json())
        .then(result => {
            removeLoadingMessage();
            if (result.code === 0) {
                addMessage('bot', result.data.content);
            } else {
                addSystemMessage(`<span style="color: #ef4444;">错误:</span> ${result.msg}`);
            }
        })
        .catch(error => {
            removeLoadingMessage();
            addSystemMessage(`<span style="color: #ef4444;">网络错误:</span> ${error.message}`);
        });
    }

    function sendStreamRequest(modelId, message) {
        var eventSource = new EventSource(`/admin/model/stream?model_id=${modelId}&message=${encodeURIComponent(message)}`);
        
        var botMessage = '';
        
        eventSource.onmessage = function(event) {
            try {
                var data = JSON.parse(event.data);
                if (data.code === 0) {
                    if (data.content) {
                        botMessage += data.content;
                        removeLoadingMessage();
                        addMessage('bot', botMessage);
                    }
                    if (data.finish) {
                        eventSource.close();
                    }
                } else {
                    eventSource.close();
                    removeLoadingMessage();
                    addSystemMessage(`<span style="color: #ef4444;">错误:</span> ${data.msg}`);
                }
            } catch (e) {
                console.error('解析响应失败:', e);
            }
        };

        eventSource.onerror = function() {
            eventSource.close();
            removeLoadingMessage();
            if (botMessage) {
                addMessage('bot', botMessage);
            } else {
                addSystemMessage('<span style="color: #ef4444;">流式连接失败</span>');
            }
        };
    }

    $('#messageInput').on('keyup', function(e) {
        if (e.keyCode === 13 && !e.shiftKey) {
            e.preventDefault();
            $('#sendBtn').click();
        }
    });
});
</script>
{% end %}

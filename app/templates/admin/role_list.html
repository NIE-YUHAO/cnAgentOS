{% extends "layout.html" %}

{% block title %}角色管理{% end %}

{% block page_title %}角色管理{% end %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header">
        <div class="layui-row">
            <div class="layui-col-md8">
                <h3 class="layui-card-title">角色管理</h3>
            </div>
            <div class="layui-col-md4" style="text-align: right;">
                <button class="layui-btn" id="addBtn">
                    <i class="layui-icon layui-icon-add-circle"></i> 新增角色
                </button>
            </div>
        </div>
    </div>
    <div class="layui-card-body">
        <div class="layui-btn-group" style="margin-bottom: 15px;">
            <button class="layui-btn layui-btn-danger" id="batchDeleteBtn" disabled>
                <i class="layui-icon layui-icon-delete"></i> 批量删除
            </button>
        </div>

        <table class="layui-hide" id="roleTable" lay-filter="roleTable"></table>

        <script type="text/html" id="toolbarDemo">
            <div class="layui-btn-container">
                <button class="layui-btn layui-btn-sm" lay-event="add">
                    <i class="layui-icon layui-icon-add-circle"></i> 新增
                </button>
            </div>
        </script>

        <script type="text/html" id="barDemo">
            &#123;&#123;#" &#125;&#125;   if(d.is_super !== 1){ &#125;&#125;
            <a class="layui-btn layui-btn-xs" lay-event="edit">
                <i class="layui-icon layui-icon-edit"></i> 编辑
            </a>
            <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">
                <i class="layui-icon layui-icon-delete"></i> 删除
            </a>
            &#123;&#123;#" &#125;&#125;   } else { &#125;&#125;
            <span class="layui-badge layui-bg-orange">不可操作</span>
            &#123;&#123;#" &#125;&#125;   } &#125;&#125;
        </script>

        <script type="text/html" id="superTpl">
            &#123;&#123;#" &#125;&#125;   if(d.is_super === 1){ &#125;&#125;
            <span class="layui-badge layui-bg-orange">超级管理�?/span>
            &#123;&#123;#" &#125;&#125;   } else { &#125;&#125;
            <span class="layui-badge">普通角�?/span>
            &#123;&#123;#" &#125;&#125;   } &#125;&#125;
        </script>

        <script type="text/html" id="statusTpl">
            &#123;&#123;#" &#125;&#125;   if(d.status === 1){ &#125;&#125;
            <span class="layui-badge layui-bg-green">启用</span>
            &#123;&#123;#" &#125;&#125;   } else { &#125;&#125;
            <span class="layui-badge layui-bg-gray">禁用</span>
            &#123;&#123;#" &#125;&#125;   } &#125;&#125;
        </script>
    </div>
</div>

<div id="roleModal" style="display: none;">
    <form class="layui-form" id="roleForm" lay-filter="roleForm">
        <input type="hidden" name="id">
        <div class="layui-form-item">
            <label class="layui-form-label">角色名称</label>
            <div class="layui-input-block">
                <input type="text" name="name" lay-verify="required" placeholder="请输入角色名�? class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">角色编码</label>
            <div class="layui-input-block">
                <input type="text" name="code" lay-verify="required" placeholder="请输入角色编�? class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">角色描述</label>
            <div class="layui-input-block">
                <textarea name="description" placeholder="请输入角色描�? class="layui-textarea"></textarea>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">状�?/label>
            <div class="layui-input-block">
                <input type="radio" name="status" value="1" title="启用" checked>
                <input type="radio" name="status" value="0" title="禁用">
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block">
                <button type="submit" class="layui-btn" lay-submit lay-filter="submitForm">确认提交</button>
                <button type="button" class="layui-btn layui-btn-primary" id="closeModal">取消</button>
            </div>
        </div>
    </form>
</div>
{% end %}

{% block script %}
<script>
layui.use(['table', 'layer', 'form'], function() {
    var table = layui.table;
    var layer = layui.layer;
    var form = layui.form;

    var roleTable = table.render({
        elem: '#roleTable',
        url: '/admin/role/api',
        method: 'GET',
        page: true,
        limit: 20,
        limits: [10, 20, 50, 100],
        toolbar: '#toolbarDemo',
        defaultToolbar: ['filter', 'exports', 'print'],
        cols: [[
            {type: 'checkbox', fixed: 'left'},
            {field: 'id', title: 'ID', width: 80, sort: true},
            {field: 'name', title: '角色名称', width: 150},
            {field: 'code', title: '角色编码', width: 150},
            {field: 'description', title: '角色描述'},
            {field: 'is_super', title: '类型', width: 120, templet: '#superTpl'},
            {field: 'status', title: '状�?, width: 100, templet: '#statusTpl'},
            {field: 'created_at', title: '创建时间', width: 180},
            {fixed: 'right', title: '操作', width: 150, toolbar: '#barDemo'}
        ]]
    });

    $('#addBtn').on('click', function() {
        openModal();
    });

    table.on('toolbar(roleTable)', function(obj) {
        if (obj.event === 'add') {
            openModal();
        }
    });

    var openModal = function(data) {
        layer.open({
            type: 1,
            title: data ? '编辑角色' : '新增角色',
            content: $('#roleModal'),
            area: ['500px', '400px'],
            success: function() {
                form.val('roleForm', {
                    'id': '',
                    'name': '',
                    'code': '',
                    'description': '',
                    'status': '1'
                });
                if (data) {
                    form.val('roleForm', {
                        'id': data.id,
                        'name': data.name,
                        'code': data.code,
                        'description': data.description || '',
                        'status': String(data.status)
                    });
                }
            }
        });
    };

    $('#closeModal').on('click', function() {
        layer.closeAll('page');
    });

    form.on('submit(submitForm)', function(data) {
        var url = '/admin/role/api';
        var method = 'POST';

        if (data.field.id) {
            method = 'PUT';
        }

        layer.load(2, {shade: [0.3, '#000']});

        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams(data.field)
        })
        .then(response => response.json())
        .then(result => {
            layer.closeAll('loading');
            if (result.code === 0) {
                layer.msg(result.msg, {icon: 1}, function() {
                    layer.closeAll('page');
                    roleTable.reload();
                });
            } else {
                layer.msg(result.msg, {icon: 2});
            }
        })
        .catch(error => {
            layer.closeAll('loading');
            layer.msg('网络请求失败', {icon: 2});
        });

        return false;
    });

    table.on('tool(roleTable)', function(obj) {
        var data = obj.data;
        if (obj.event === 'edit') {
            openModal(data);
        } else if (obj.event === 'del') {
            layer.confirm('确定要删除该角色吗？', {icon: 3}, function(index) {
                layer.close(index);
                layer.load(2, {shade: [0.3, '#000']});

                fetch('/admin/role/api', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({ids: data.id})
                })
                .then(response => response.json())
                .then(result => {
                    layer.closeAll('loading');
                    if (result.code === 0) {
                        layer.msg(result.msg, {icon: 1});
                        obj.del();
                    } else {
                        layer.msg(result.msg, {icon: 2});
                    }
                })
                .catch(error => {
                    layer.closeAll('loading');
                    layer.msg('网络请求失败', {icon: 2});
                });
            });
        }
    });

    $('#batchDeleteBtn').on('click', function() {
        var checkStatus = table.checkStatus('roleTable');
        var data = checkStatus.data;

        if (data.length === 0) {
            layer.msg('请选择要删除的角色', {icon: 2});
            return;
        }

        var ids = data.map(item => item.id).join(',');

        layer.confirm('确定要删除选中�?' + data.length + ' 个角色吗�?, {icon: 3}, function(index) {
            layer.close(index);
            layer.load(2, {shade: [0.3, '#000']});

            fetch('/admin/role/api', {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({ids: ids})
            })
            .then(response => response.json())
            .then(result => {
                layer.closeAll('loading');
                if (result.code === 0) {
                    layer.msg(result.msg, {icon: 1}, function() {
                        roleTable.reload();
                        $('#batchDeleteBtn').attr('disabled', true);
                    });
                } else {
                    layer.msg(result.msg, {icon: 2});
                }
            })
            .catch(error => {
                layer.closeAll('loading');
                layer.msg('网络请求失败', {icon: 2});
            });
        });
    });

    table.on('checkbox(roleTable)', function(obj) {
        var checkStatus = table.checkStatus('roleTable');
        $('#batchDeleteBtn').attr('disabled', checkStatus.data.length === 0);
    });
});
</script>
{% end %}

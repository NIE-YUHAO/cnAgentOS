{% extends "base.html" %}

{% block title %}登录{% end %}

{% block content %}
    <h2>用户登录</h2>
    <form method="post" action="/login">
        <div>
            <label>用户名：</label>
            <input type="text" name="username" required>
        </div>
        <div>
            <label>密码：</label>
            <input type="password" name="password" required>
        </div>
        <div>
            <button type="submit">登录</button>
        </div>
    </form>
    <p>还没有账号？<a href="/register">立即注册</a></p>
{% end %}
